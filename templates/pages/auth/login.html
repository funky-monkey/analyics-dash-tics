{{template "base.html" .}}

{{define "title"}}Sign in — Dashtics{{end}}

{{define "content"}}
<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h1 class="text-2xl font-bold mb-1">Welcome back</h1>
    <p class="text-gray-500 text-sm mb-8">Sign in to your account</p>

    {{if .Error}}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/login" class="space-y-4">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required autocomplete="email"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input type="password" id="login-password" name="password" required autocomplete="current-password"
            class="w-full px-3 py-2 pr-10 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
          <button type="button" onclick="togglePw('login-password','login-eye-show','login-eye-hide')"
            class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-400 hover:text-gray-600">
            <svg id="login-eye-show" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="login-eye-hide" style="display:none" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit"
        class="w-full bg-violet-600 hover:bg-violet-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
        Sign in
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account? <a href="/signup" class="text-violet-600 hover:underline">Sign up</a>
    </p>
    <p class="text-center text-sm mt-2">
      <a href="/forgot-password" class="text-gray-400 hover:text-gray-600 text-xs">Forgot password?</a>
    </p>
  </div>
</div>
<script nonce="{{.Nonce}}">
function togglePw(inputId, showIconId, hideIconId) {
  var input = document.getElementById(inputId);
  var isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  document.getElementById(showIconId).style.display = isHidden ? 'none' : '';
  document.getElementById(hideIconId).style.display = isHidden ? '' : 'none';
}
</script>
{{end}}
